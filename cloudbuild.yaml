steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",

        "--build-arg",
        "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_VAPID_KEY=${_NEXT_PUBLIC_FIREBASE_VAPID_KEY}",
        "--build-arg",
        "NEXT_PUBLIC_MAPBOX_TOKEN=${_NEXT_PUBLIC_MAPBOX_TOKEN}",
        "--build-arg",
        "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_NEXT_PUBLIC_VAPID_PUBLIC_KEY}",

        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/front-repo/petrocarga-image-front:$COMMIT_SHA",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/front-repo/petrocarga-image-front:latest",
        "-f",
        "petrocarga/Dockerfile",
        "petrocarga",
      ]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/front-repo/petrocarga-image-front:$COMMIT_SHA"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/front-repo/petrocarga-image-front:latest"

options:
  logging: CLOUD_LOGGING_ONLY
